name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Build
      env:
        GOOS: windows
        GOARCH: amd64
        CGO_ENABLED: '1'
      run: |
        mkdir builds
        go build -ldflags "-H windowsgui" -o builds/oilempire.exe .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: oilempire-windows
        path: builds/oilempire.exe

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: builds/oilempire.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}